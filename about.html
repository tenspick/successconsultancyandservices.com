<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>About Us | Success Consultancy and Services</title>

<link rel="icon" href="logo.jpg" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  overflow-x: hidden;
}

/* Optimized glass */
.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  border-radius: 20px;
}

/* Faster transitions */
.gallery-card img {
  transition: 0.4s ease;
}

.gallery-overlay {
  transition: 0.3s ease;
}

/* Disable heavy effects on mobile */
@media (max-width:768px){
  *{
    animation:none!important;
    transition:none!important;
  }
}
</style>
</head>

<body class="bg-white text-slate-900">

<header id="siteHeader"></header>

<main>

<!-- HERO -->
<section class="h-[60vh] flex items-center justify-center relative">
  <img src="images/office gallery 1.avif" loading="lazy"
    class="absolute w-full h-full object-cover opacity-30 blur-sm">

  <div class="glass p-10 text-center" data-aos="fade-up">
    <h1 class="text-5xl font-black text-white">Our Story & Vision</h1>
    <p class="text-white mt-4">Building careers since 2025</p>
  </div>
</section>

<!-- FOUNDER -->
<section class="py-20 max-w-7xl mx-auto px-4 grid lg:grid-cols-2 gap-10">

  <div data-aos="fade-right">
    <img src="founder.jpg" loading="lazy" class="rounded-3xl shadow-xl">
  </div>

  <div data-aos="fade-left">
    <h2 class="text-4xl font-black mb-4">R. Murali</h2>
    <p class="text-slate-600">
      Success Consultancy focuses on real-world training and placements.
    </p>
  </div>

</section>

<!-- VALUES -->
<section class="py-20 bg-slate-50">
<div class="max-w-7xl mx-auto grid md:grid-cols-3 gap-6 px-4">

  <div class="glass p-6" data-aos="fade-up">
    <h3 class="font-bold text-xl mb-2">Mission</h3>
    <p>Bridge skill gaps.</p>
  </div>

  <div class="glass p-6" data-aos="fade-up">
    <h3 class="font-bold text-xl mb-2">Vision</h3>
    <p>Trusted training ecosystem.</p>
  </div>

  <div class="glass p-6" data-aos="fade-up">
    <h3 class="font-bold text-xl mb-2">Strength</h3>
    <p>Placement focused.</p>
  </div>

</div>
</section>

<!-- GALLERY -->
<section class="py-20 px-4">
<div class="max-w-7xl mx-auto columns-2 md:columns-3 gap-4">

  <div class="gallery-card">
    <img src="images/opening ceremony 1.jpeg" loading="lazy">
  </div>

  <div class="gallery-card">
    <img src="images/opening ceremony 2.jpeg" loading="lazy">
  </div>

  <div class="gallery-card">
    <img src="images/opening ceremony 3.jpeg" loading="lazy">
  </div>

</div>
</section>

<!-- CTA -->
<section class="py-20 text-center">
  <h2 class="text-3xl font-black mb-6">Join the Journey</h2>
  <a href="contact.html" class="bg-blue-600 text-white px-8 py-4 rounded-full">Enroll Now</a>
</section>

</main>

<footer class="text-center py-10 text-slate-400">
© <span id="year"></span> Success Consultancy
</footer>

<script src="https://unpkg.com/aos@next/dist/aos.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {

  AOS.init({
    duration: 600,
    once: true,
    offset: 80
  });

  document.getElementById("year").textContent = new Date().getFullYear();

});
</script>

</body>
</html>
